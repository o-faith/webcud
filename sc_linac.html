<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>SC Linac Status</title>
		<meta name="author" content="Matt Gibbs">
		<link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
		<link href="metricsgraphics.css" rel="stylesheet">
		<link href="sc_linac.css" rel="stylesheet">
		<script src="d3/d3.min.js"></script>
		<script src="metricsgraphics.min.js"></script>
	</head>
	<body>
		<div class="container-fluid">
			<div class="row">
				<div class="col-xs-12 col-sm-6">
					<div class="cell-label">
						<h1>LCLS SC Linac Status <span id="errormsg"></span></h1>
					</div>
					<div class="row">
						<div class="col-xs-12 col-sm-4 col-md-4">
							<div class="cell-label">
								BSY Dump Rate
							</div>
							<span id="bsydRate" class="cell PVmonitor" data-pv="TPG:SYS0:1:DST02:RATE"></span>
						</div>
						<div class="col-xs-12 col-sm-4 col-md-4">
							<div class="cell-label">
								HXR Undulator Rate
							</div>
							<span id="hxrRate" class="cell PVmonitor" data-pv="TPG:SYS0:1:DST03:RATE"></span>
						</div>
						<div class="col-xs-12 col-sm-4 col-md-4">
							<div class="cell-label">
								SXR Undulator Rate
							</div>
							<span id="sxrRate" class="cell PVmonitor" data-pv="TPG:SYS0:1:DST04:RATE"></span>
						</div>
					</div>
					
					<div class="row">
						<div class="col-xs-12 col-sm-6 col-md-3">
							<div class="cell-label">
								Bunch Charge
							</div>
							<span id="bunchCharge" class="cell PVmonitor" data-pv="TORO:GUNB:360:CHRG"></span>
						</div>
						<div class="col-xs-12 col-sm-6 col-md-3">
							<div class="cell-label">
								BC1B Energy
							</div>
							<span id="bc1bEnergy" class="cell PVmonitor" data-pv="BEND:BC1B:400:EDES" data-units="GeV" data-precision="2"></span>
						</div>
						<div class="col-xs-12 col-sm-6 col-md-3">
							<div class="cell-label">
								BC2B Energy
							</div>
							<span id="bc2bEnergy" class="cell PVmonitor" data-pv="BEND:BC2B:500:EDES" data-units="GeV" data-precision="2"></span>
						</div>
						<div class="col-xs-12 col-sm-6 col-md-3">
							<div class="cell-label">
								BSYD Energy
							</div>
							<span id="bsydEnergy" class="cell PVmonitor" data-pv="REFS:BSYD:400:EDES" data-units="GeV" data-precision="2"></span>
						</div>
					</div>
					
					<div class="row">
						<div class="col-xs-12">
							<table class="table" id="emittanceTable">
								<thead>
									<tr>
										<th></th>
										<th>X Emittance / Bmag</th>
										<th>Y Emittance / Bmag</th>
									</tr>
								</thead>
								<tbody>
									<tr>
										<th scope="row">HTR</th>
										<td><span id="HTRXEmit" class="emittanceValue" data-pv="OTRS:HTR:330:EMITN_X" data-precision="2" data-units=""></span> / <span id="HTRXMatch" class="matchingValue" data-pv="OTRS:HTR:330:BMAG_X" data-precision="2" data-units=""></span></td>
										<td><span id="HTRYEmit" class="emittanceValue" data-pv="OTRS:HTR:330:EMITN_Y" data-precision="2" data-units=""></span> / <span id="HTRYMatch" class="matchingValue" data-pv="OTRS:HTR:330:BMAG_Y" data-precision="2" data-units=""></span></td>
									</tr>
									<tr>
										<th scope="row">COL0</th>
										<td><span id="COL0XEmit" class="emittanceValue" data-pv="PROF:COL0:535:EMITN_X" data-precision="2" data-units=""></span> / <span id="COL0XMatch" class="matchingValue" data-pv="PROF:COL0:535:BMAG_X" data-precision="2" data-units=""></span></td>
										<td><span id="COL0YEmit" class="emittanceValue" data-pv="PROF:COL0:535:EMITN_Y" data-precision="2" data-units=""></span> / <span id="COL0YMatch" class="matchingValue" data-pv="PROF:COL0:535:BMAG_Y" data-precision="2" data-units=""></span></td>
									</tr>
									<tr>
										<th scope="row">LTUS</th>
										<td><span id="LTUSXEmit" class="emittanceValue" data-pv="WIRE:LTUS:735:EMITN_X" data-precision="2" data-units=""></span> / <span id="LTUSXMatch" class="matchingValue" data-pv="WIRE:LTUS:735:BMAG_X" data-precision="2" data-units=""></span></td>
										<td><span id="LTUSYEmit" class="emittanceValue" data-pv="WIRE:LTUS:735:EMITN_Y" data-precision="2" data-units=""></span> / <span id="LTUSYMatch" class="matchingValue" data-pv="WIRE:LTUS:735:BMAG_Y" data-precision="2" data-units=""></span></td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
					
				</div>
				<div class="col-xs-12 col-sm-6"><!-- FEL Status -->
					<div class="cell-label">
						<h1>SXR FEL Status</h1>
					</div>
					<div class="row">
						<div class="col-xs-12 col-sm-12 col-md-6">
							<div class="cell-label">
								FEL Pulse Intensity
							</div>
							<span id="sxrPulseIntensity" class="cell PVmonitor" data-pv="EM1K0:GMD:HPS:AvgPulseIntensity" data-precision="0" data-units="uJ"></span>
						</div>
						<div class="col-xs-12 col-sm-12 col-md-6">
							<div class="cell-label">
								Photon Energy
							</div>
							<span id="photonEnergy" class="cell PVmonitor" data-pv="SIOC:SYS0:ML00:AO628" data-precision="1"></span>
						</div>
					</div>
				</div>
				<div class="col-xs-12 col-sm-6" id="program"><!-- Program Status -->
					<div class="cell-label" style="padding-top: 30px">
						<h1>Scheduled Program</h1>
					</div>
				</div><!-- end program status -->
				<script>
					const dateFormatter = d3.timeFormat("%b %d %H:%M");
					function getProgramInfo() {
						fetch('https://aosd.slac.stanford.edu/program_calendar/timetable/?line=SXR&non_user_events=SC').then((response) => {
							if (!response.ok) {
								throw new Error("HTTP Error while fetching history data: " + response.status);
							}
							return response.json();
						}).then((data) => {
							console.log(data);
							d3.select("#program").selectAll("div.row")
							  .data(data)
							  .enter()
								  .append(function(ds, i, nodes) {
									if (i < 3) {
										var progdiv = document.createElement("div");
										progdiv.className = "row";
										for (d of ds) {
											var timediv = document.createElement("div");
											timediv.className = "col-xs-3 col-sm-3 col-md-2";
											var timeh3 = document.createElement("h3");
											const startDate = Date.parse(d['start']);
											var dateString = dateFormatter(startDate);
											if (startDate < Date.now()) {
												dateString = "Now"
											}
											var timetext = document.createTextNode(dateString);
											timeh3.appendChild(timetext);
											timediv.appendChild(timeh3);
											progdiv.appendChild(timediv);
											var descdiv = document.createElement("div");
											descdiv.className = "col-xs-9 col-sm-9 col-md-10";
											var desch3 = document.createElement("h3");
											if (d['hutch'] === null) {
												var descString = d['description'];
												var desc = document.createTextNode(descString);
												desch3.appendChild(desc);
											} else {
												desch3.insertAdjacentText("afterbegin", "Deliver to ");
												var hutchSpan = document.createElement("span");
												var hutchStyle = `background-color: ${d['hutch']['color']}; padding: 0px 3px 0px 3px; border-radius: 7px; color: ${d['hutch']['text_color']}`;
												hutchSpan.setAttribute("style", hutchStyle);
												hutchSpan.insertAdjacentText("afterbegin", d['hutch']['name']);
												desch3.appendChild(hutchSpan);
											}
											descdiv.appendChild(desch3);
											if (d['config'] !== null) {
												console.log("CONF!")
												var confSpan = document.createElement("span");
												confSpan.insertAdjacentText("afterbegin", d['config']);
												descdiv.appendChild(confSpan);
											}
											progdiv.appendChild(descdiv);
										}
										return progdiv;
									}
								  });
						}).catch((error) => {
						   console.log("Failed to parse history data: " + error.message); 
						});
					}
					getProgramInfo();
					setInterval(function() { getProgramInfo(); }, 120000);
				</script>
			</div><!-- end grid of data stuff -->
			<div class="row"><!-- graph row begin -->
				<div class="col-xs-12" id="history">
					<div class="cell-label">
						<h1>24 Hour SXR Pulse Intensity History</h1>
					</div>
					<div id="gdethistory"></div>
					<script>
                        var fixed_formatter = d3.format("0.1f");
                        function gdetFormatter(num) {
                          console.log(fixed_formatter(num) + "mJ");
                          return fixed_formatter(num) + "mJ";
                        }
                        var gdet_plot_params = {
                            width: 800,
                            full_width: true,
                            top: 10,
                            left: 70,
                            y_extended_ticks: true,
                            axes_not_compact: true,
                            height: 160,
                            target: '#gdethistory',
                            x_accessor: 'date',
                            y_accessor: 'val',
                            min_y: 0,
                            area: true,
                            yax_format: gdetFormatter
                        };
                        function getGDETData() {
                            var my_fixed_formatter = d3.format("0.1f");
                            var now = new Date();
                            var oneDayAgo = new Date(now - 60*60*24*1000);
                            fetch('https://aosd.slac.stanford.edu/archiver/retrieval/data/getDataForPVs.json?pv=mean_90(EM1K0:GMD:HPS:AvgPulseIntensity)'+'&from='+oneDayAgo.toISOString()+'&to='+now.toISOString()).then((response) => {
                                if (!response.ok) {
                                    throw new Error("HTTP Error while fetching history data: " + response.status);
                                }
                                return response.json();
                            }).then((data) => {
                                var gdet_time_series = data[0].data.map(function(item) {
                                    return {"date": new Date(item.secs * 1000), "val": item.val};
                                });
                                gdet_plot_params.data = gdet_time_series;
                                gdet_plot_params.min_x = gdet_time_series[0].date;
                                MG.data_graphic(gdet_plot_params);
                            }).catch((error) => {
                               console.log("Failed to parse history data: " + error.message); 
                            });
                        };
                        getGDETData();
                        setInterval(function() { getGDETData(); }, 120000);
					</script>
				</div>
			</div><!-- graph row end -->	
		</div><!-- container end -->
	</body>
	<script src="socket/webPV-Socket.js"></script>
	<script src="socket/sc_linac.js"></script>
</html>
